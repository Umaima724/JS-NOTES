<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>ASYNNC DEMOS 2</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    // When JavaScript calls setInterval(), the runtime starts a repeating timer
    // After each specified interval, the callback is placed in the Task Queue, and the Event Loop moves it to the Call Stack whenever the stack is empty
    // This process repeats until clearInterval() is called
    const sayDate = function(str){
        console.log(str, Date.now());
    }
    let intervalId;
    document.querySelector('#start').addEventListener('click',function(){
        console.log("started");
        intervalId = setInterval(sayDate,1000,"hi")
    })
    
    document.querySelector('#stop').addEventListener('click',function(){
        clearInterval(intervalId)
        console.log("stopped");
    })
    
</script>
</html>
