    // Instead of adding a click event to every image individually

    // This technique is called Event Delegation

    document.querySelector('#images').addEventListener('click',function(e){
        console.log(e.target.tagName); // tag name returns HTML tag name in uppercase
        if(e.target.tagName === 'IMG'){
    // parentNode gives us the parent element i.e <li> insteaf od only <img> so there isn't an empty bullet point left behind
            let removeIt = e.target.parentNode
            removeIt.remove()
